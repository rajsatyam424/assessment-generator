# Assessment Generator — Configuration

# LLM
ASSESSMENT_PROVIDER: openai
ASSESSMENT_MODEL: gpt-4o-mini

# OpenAI compatible — set OPENAI_API_KEY in .env
# For OpenRouter: set provider to openrouter, model like anthropic/claude-sonnet-4

# Output
ASSESSMENT_OUTPUT_DIR: /tmp/assessments
ASSESSMENT_CLEANUP_HOURS: 24

# Server
HOST: 0.0.0.0
PORT: 8000
